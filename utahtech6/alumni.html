        <main>
            <h2>Join Alumni Mailing List</h2>
            <h3>Request Alumni Newsletter</h3>
            <p>Required information is marked with an asterisk (*).</p>
            <form method="post" action="https://kearl.net/se1400/mail.php">
                <label for="myFName">*First Name:</label><input type="text" name="myFName" id="myFName" required>
                <label for="myLName">*Last Name:</label><input type="text" name="myLName" id="myLName" required>
                <label for="myEmail">*Email:</label><input type="email" name="myEmail" id="myEmail" required>
                <label for="myPhone">Phone:</label><input type="tel" name="myPhone" id="myPhone">
                <label for="myGraduation">Graduation Date:</label><input type="date" name="Graduation Date"
                    id="myGraduation">
                <label for="myComments">*Comments:</label><textarea name="myComments" id="myComments" cols="20"
                    required></textarea>
                rows="2"></textarea>
                <input type="submit" value="Submit" id="mySubmit">
            </form>
